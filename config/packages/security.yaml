security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        admin_provider:
            memory:
                users:
                    admin:
                        password: '$2y$13$w6/4gzF6mBb3rqe2.SpJ4uuALTy/uJ3LawxxgfWwXdZxr/seaspfC'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: admin_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: false
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }